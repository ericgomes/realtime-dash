<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Config de Sites — Realtime Dash</title>

  <script>
    (function() {
      var t = localStorage.getItem('theme');
      if (t === 'dark' || (!t && window.matchMedia('(prefers-color-scheme: dark)').matches)) {
        document.documentElement.classList.add('dark');
      }
    })();
  </script>

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@400;500;600;700&display=swap" rel="stylesheet" />

  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = { darkMode: 'class', theme: { extend: { fontFamily: { sans: ['Rajdhani', 'ui-sans-serif', 'system-ui', 'sans-serif'] } } } };
  </script>
</head>
<body class="font-sans bg-slate-100 dark:bg-slate-900 text-slate-800 dark:text-slate-100">
  <div class="max-w-5xl mx-auto p-4 sm:p-6">

    <header class="flex flex-wrap items-center justify-between gap-3 mb-6">
      <div>
        <h1 class="text-2xl font-bold text-slate-900 dark:text-white">Config de Sites</h1>
        <p class="text-sm text-slate-500 dark:text-slate-400">Realtime Dash — administração</p>
      </div>
      <button id="theme-toggle" aria-label="Alternar tema"
        class="w-9 h-9 flex items-center justify-center rounded-lg border border-slate-300 dark:border-slate-600 hover:bg-slate-200 dark:hover:bg-slate-700">
        <span id="theme-icon">🌙</span>
      </button>
    </header>

    <section class="bg-white dark:bg-slate-800 rounded-xl shadow-sm p-4 mb-6">
      <label class="block text-xs font-medium text-slate-500 dark:text-slate-400 mb-1">Senha de administração (ADMIN_SECRET)</label>
      <div class="flex gap-2">
        <input id="admin-secret" type="password" class="flex-1 border border-slate-300 dark:border-slate-600 dark:bg-slate-700 dark:text-slate-100 rounded-lg px-3 py-2 text-sm" placeholder="admin secret" />
        <button id="load" class="bg-slate-900 text-white dark:bg-white dark:text-slate-900 rounded-lg px-4 py-2 text-sm font-medium hover:bg-slate-700 dark:hover:bg-slate-200">Carregar</button>
      </div>
      <p id="msg" class="text-sm mt-2"></p>
    </section>

    <details class="bg-white dark:bg-slate-800 rounded-xl shadow-sm p-4 mb-6">
      <summary class="font-semibold cursor-pointer">+ Novo site</summary>
      <div id="new-form" class="grid grid-cols-1 sm:grid-cols-2 gap-3 mt-3"></div>
      <button id="create" class="mt-3 bg-emerald-600 text-white rounded-lg px-4 py-2 text-sm font-medium hover:bg-emerald-700">Criar site</button>
    </details>

    <div id="list" class="space-y-4"></div>
  </div>

  <script>
    const API_BASE = 'https://realtime-dash-eric-9609s-projects.vercel.app';
    // Dominios que servem o mesmo projeto. O escolhido vai no src da tag.
    // O 1o e o padrao. Ambos precisam estar no CSP do site do cliente.
    const TAG_HOSTS = [
      { label: 'lsm.agenciademarketingdigital.com.br (padrão)', url: 'https://lsm.agenciademarketingdigital.com.br' },
      { label: 'realtime-dash-…vercel.app (prospin · já no CSP)', url: 'https://realtime-dash-eric-9609s-projects.vercel.app' }
    ];
    // Versao do loader (?v=). Bump junto com public/lsm.js para forçar atualização imediata.
    const LSM_VERSION = '20260711';
    const el = (id) => document.getElementById(id);

    const FIELDS = [
      { k: 'name', label: 'Nome', type: 'text' },
      { k: 'site', label: 'Site', type: 'text' },
      { k: 'allowed_domains', label: 'Domínios permitidos (vírgula)', type: 'text' },
      { k: 'sample_rate', label: 'Sample rate (% ou fração)', type: 'number', step: 'any' },
      { k: 'slow_threshold_ms', label: 'Limite lento (ms)', type: 'number' },
      { k: 'very_slow_threshold_ms', label: 'Limite muito lento (ms)', type: 'number' },
      { k: 'retention_hours', label: 'Retenção (horas)', type: 'number', step: 'any' },
      { k: 'aggregation_freshness_minutes', label: 'Freshness (min)', type: 'number' },
      { k: 'min_group_size', label: 'Mínimo por grupo', type: 'number' },
      { k: 'default_period_key', label: 'Período padrão', type: 'select', options: ['15m', '30m', '60m', '3h'] },
      { k: 'timezone', label: 'Timezone', type: 'text' }
    ];

    function secret() { return el('admin-secret').value.trim(); }
    function setMsg(text, ok) {
      el('msg').textContent = text;
      el('msg').className = 'text-sm mt-2 ' + (ok ? 'text-emerald-600' : 'text-red-500');
    }

    function inputHtml(f) {
      const base = 'w-full border border-slate-300 dark:border-slate-600 dark:bg-slate-700 dark:text-slate-100 rounded-lg px-2 py-1.5 text-sm';
      if (f.type === 'select') {
        return '<select data-field="' + f.k + '" class="' + base + '">' +
          f.options.map(o => '<option value="' + o + '">' + o + '</option>').join('') + '</select>';
      }
      return '<input data-field="' + f.k + '" type="' + f.type + '"' + (f.step ? ' step="' + f.step + '"' : '') + ' class="' + base + '" />';
    }

    function fieldsGrid() {
      return FIELDS.map(f =>
        '<div><label class="block text-xs font-medium text-slate-500 dark:text-slate-400 mb-1">' + f.label + '</label>' + inputHtml(f) + '</div>'
      ).join('');
    }

    function setValues(scope, t) {
      FIELDS.forEach(f => {
        const inp = scope.querySelector('[data-field="' + f.k + '"]');
        if (!inp) return;
        let v = t[f.k];
        if (f.k === 'allowed_domains' && Array.isArray(v)) v = v.join(', ');
        inp.value = (v == null) ? '' : v;
      });
    }

    function gather(scope) {
      const obj = {};
      FIELDS.forEach(f => {
        const inp = scope.querySelector('[data-field="' + f.k + '"]');
        if (inp) obj[f.k] = inp.value;
      });
      return obj;
    }

    function samplePct(t) {
      const r = t.sample_rate;
      if (r == null || isNaN(r)) return 10;
      return r > 1 ? Math.round(r) : Math.round(r * 100);
    }
    function gtmTag(token, pct, host) {
      return '<script async src="' + (host || TAG_HOSTS[0].url) + '/lsm.js?v=' + LSM_VERSION + '" data-token="' + token + '" data-sample="' + pct + '"><\/script>';
    }
    function gtmTagInline(token, pct, host) {
      const A = (host || TAG_HOSTS[0].url) + '/api/ingest';
      return '<script>\n' +
'(function(){\n' +
'  var A=\'' + A + '\',T=\'' + token + '\',S=' + pct + ',last=location.pathname;\n' +
'  if(window.__lsm)return;window.__lsm=1;\n' +
'  if(Math.random()*100>=S)return;\n' +
'  function P(t){var c=navigator.connection||{};return{page_location:location.href,page_path:location.pathname,sample_rate:S,nav_type:t,user_agent:navigator.userAgent,width:innerWidth,height:innerHeight,timestamp:new Date().toISOString(),effective_type:c.effectiveType||null,downlink:c.downlink||null};}\n' +
'  function G(p){fetch(A,{method:\'POST\',headers:{\'content-type\':\'application/json\',\'x-ingest-token\':T},body:JSON.stringify(p),keepalive:true}).catch(function(){});}\n' +
'  setTimeout(function(){var n=performance.getEntriesByType&&performance.getEntriesByType(\'navigation\')[0];if(!n||!n.loadEventEnd)return;var a=n.activationStart||0,p=P(\'load\');p.prerendered=a>0;p.load_time_ms=Math.max(0,Math.round(n.loadEventEnd-a));p.dom_ready_ms=Math.max(0,Math.round(n.domContentLoadedEventEnd-a));p.ttfb_ms=Math.round(n.responseStart-n.requestStart);G(p);},0);\n' +
'  function R(){setTimeout(function(){if(location.pathname==last)return;last=location.pathname;G(P(\'spa\'));},0);}\n' +
'  [\'pushState\',\'replaceState\'].forEach(function(m){var o=history[m];if(o)history[m]=function(){var r=o.apply(this,arguments);R();return r;};});\n' +
'  addEventListener(\'popstate\',R);\n' +
'})();\n' +
'<\/script>';
    }

    function tenantCard(t) {
      const card = document.createElement('details');
      card.className = 'bg-white dark:bg-slate-800 rounded-xl shadow-sm p-4';
      const pctVal = samplePct(t);
      card.innerHTML =
        '<summary class="flex items-center gap-2 cursor-pointer font-bold">' +
          '<span>' + t.slug + '</span>' +
          '<span class="text-xs font-normal ' + (t.is_active === false ? 'text-red-500' : 'text-emerald-600') + '">' + (t.is_active === false ? '· inativo' : '· ativo') + '</span>' +
          '<span class="ml-auto text-xs font-normal text-slate-400 dark:text-slate-500">' + (t.site || '') + '</span>' +
        '</summary>' +
        '<div class="mt-3">' +
        '<div class="flex justify-end mb-3">' +
          '<label class="flex items-center gap-2 text-sm"><input type="checkbox" data-field="is_active" class="w-4 h-4" /> ativo</label>' +
        '</div>' +
        '<div class="grid grid-cols-1 sm:grid-cols-2 gap-3">' + fieldsGrid() + '</div>' +
        '<div class="mt-3">' +
          '<label class="block text-xs font-medium text-slate-500 dark:text-slate-400 mb-1">Domínio (usado na tag e no link do dashboard · precisa estar no CSP do site)</label>' +
          '<select data-taghost class="w-full border border-slate-300 dark:border-slate-600 dark:bg-slate-700 dark:text-slate-100 rounded-lg px-2 py-1.5 text-sm">' +
            TAG_HOSTS.map(function (h) { return '<option value="' + h.url + '">' + h.label + '</option>'; }).join('') +
          '</select>' +
        '</div>' +
        '<div class="mt-3">' +
          '<label class="block text-xs font-medium text-slate-500 dark:text-slate-400 mb-1">Ingest token</label>' +
          '<div class="flex gap-2">' +
            '<input data-token type="text" readonly class="flex-1 border border-slate-300 dark:border-slate-600 dark:bg-slate-700 dark:text-slate-100 rounded-lg px-2 py-1.5 text-sm font-mono" />' +
            '<button data-copy class="rounded-lg border border-slate-300 dark:border-slate-600 px-3 py-1.5 text-sm hover:bg-slate-100 dark:hover:bg-slate-700">Copiar</button>' +
            '<button data-regen class="rounded-lg border border-amber-400 text-amber-600 dark:text-amber-400 px-3 py-1.5 text-sm hover:bg-amber-50 dark:hover:bg-slate-700">Regenerar</button>' +
          '</div>' +
        '</div>' +
        '<div class="mt-3">' +
          '<label class="block text-xs font-medium text-slate-500 dark:text-slate-400 mb-1">Link do dashboard (token de leitura)</label>' +
          '<div class="flex gap-2">' +
            '<input data-viewlink type="text" readonly class="flex-1 border border-slate-300 dark:border-slate-600 dark:bg-slate-700 dark:text-slate-100 rounded-lg px-2 py-1.5 text-sm font-mono" />' +
            '<a data-openlink target="_blank" rel="noopener" class="rounded-lg border border-slate-300 dark:border-slate-600 px-3 py-1.5 text-sm hover:bg-slate-100 dark:hover:bg-slate-700">Abrir</a>' +
            '<button data-copylink class="rounded-lg border border-slate-300 dark:border-slate-600 px-3 py-1.5 text-sm hover:bg-slate-100 dark:hover:bg-slate-700">Copiar link</button>' +
            '<button data-regenview class="rounded-lg border border-amber-400 text-amber-600 dark:text-amber-400 px-3 py-1.5 text-sm hover:bg-amber-50 dark:hover:bg-slate-700">Regenerar</button>' +
          '</div>' +
        '</div>' +
        '<details class="mt-3">' +
          '<summary class="text-xs font-medium text-slate-500 dark:text-slate-400 cursor-pointer">Tag do GTM (HTML personalizado · gatilho All Pages · SPA automático)</summary>' +
          '<div class="mt-2 space-y-4">' +
            '<div>' +
              '<p class="text-xs font-semibold text-slate-600 dark:text-slate-300 mb-1">A) Loader <span class="font-normal text-slate-400">(recomendada)</span></p>' +
              '<p class="text-xs text-slate-400 dark:text-slate-500 mb-2">Carrega <code>/lsm.js</code> (cache 12&nbsp;h): cole uma vez e futuras mudanças propagam sozinhas. <b>Exige o domínio em <code>script-src</code> no CSP do site.</b> Tráfego baixo: remova o <code>data-sample</code> pra taxa vir do backend por sessão.</p>' +
              '<textarea data-gtmtag readonly rows="2" spellcheck="false" class="w-full border border-slate-300 dark:border-slate-600 dark:bg-slate-700 dark:text-slate-100 rounded-lg px-2 py-2 text-xs font-mono"></textarea>' +
              '<button data-copytag class="mt-2 rounded-lg border border-slate-300 dark:border-slate-600 px-3 py-1.5 text-sm hover:bg-slate-100 dark:hover:bg-slate-700">Copiar loader</button>' +
            '</div>' +
            '<div>' +
              '<p class="text-xs font-semibold text-slate-600 dark:text-slate-300 mb-1">B) Inline <span class="font-normal text-slate-400">(CSP restritivo · ex.: prospin)</span></p>' +
              '<p class="text-xs text-slate-400 dark:text-slate-500 mb-2">Código embutido — <b>não precisa de <code>script-src</code></b> (só <code>connect-src</code> pro <code>/api/ingest</code>). Também trata SPA. Taxa fixa na tag; mudou no admin, precisa recolar.</p>' +
              '<textarea data-gtmtag-inline readonly rows="10" spellcheck="false" class="w-full border border-slate-300 dark:border-slate-600 dark:bg-slate-700 dark:text-slate-100 rounded-lg px-2 py-2 text-xs font-mono"></textarea>' +
              '<button data-copytag-inline class="mt-2 rounded-lg border border-slate-300 dark:border-slate-600 px-3 py-1.5 text-sm hover:bg-slate-100 dark:hover:bg-slate-700">Copiar inline</button>' +
            '</div>' +
          '</div>' +
        '</details>' +
        '<div class="mt-3 flex justify-end"><button data-save class="bg-slate-900 text-white dark:bg-white dark:text-slate-900 rounded-lg px-4 py-2 text-sm font-medium hover:bg-slate-700 dark:hover:bg-slate-200">Salvar</button></div>' +
        '</div>';

      setValues(card, t);
      card.querySelector('[data-field="is_active"]').checked = t.is_active !== false;
      card.querySelector('[data-token]').value = t.ingest_token || '';
      const viewInput = card.querySelector('[data-viewlink]');
      const openLink = card.querySelector('[data-openlink]');
      const tagHost = card.querySelector('[data-taghost]');
      if (t.tag_host && TAG_HOSTS.some(h => h.url === t.tag_host)) tagHost.value = t.tag_host;
      const tagArea = card.querySelector('[data-gtmtag]');
      const tagInline = card.querySelector('[data-gtmtag-inline]');
      const render = () => {
        const host = tagHost.value;
        const token = t.ingest_token || 'SEU_TOKEN';
        const viewLink = t.view_token ? (host + '/?token=' + t.view_token) : '';
        viewInput.value = viewLink;
        if (viewLink) { openLink.href = viewLink; openLink.classList.remove('hidden'); } else { openLink.classList.add('hidden'); }
        tagArea.value = gtmTag(token, pctVal, host);
        tagInline.value = gtmTagInline(token, pctVal, host);
      };
      tagHost.addEventListener('change', render);
      render();
      card.querySelector('[data-copytag]').addEventListener('click', () => {
        navigator.clipboard.writeText(tagArea.value);
        setMsg('Tag loader copiada.', true);
      });
      card.querySelector('[data-copytag-inline]').addEventListener('click', () => {
        navigator.clipboard.writeText(tagInline.value);
        setMsg('Tag inline copiada.', true);
      });

      card.querySelector('[data-copy]').addEventListener('click', () => {
        navigator.clipboard.writeText(t.ingest_token || '');
        setMsg('Token copiado.', true);
      });
      card.querySelector('[data-copylink]').addEventListener('click', () => {
        navigator.clipboard.writeText(viewInput.value);
        setMsg('Link do dashboard copiado.', true);
      });
      card.querySelector('[data-regenview]').addEventListener('click', () => {
        if (confirm('Regenerar o link invalida o link atual do cliente. Continuar?')) save(card, t.id, false, true);
      });
      card.querySelector('[data-regen]').addEventListener('click', () => {
        if (confirm('Regenerar o token invalida a tag atual do cliente. Continuar?')) save(card, t.id, true);
      });
      card.querySelector('[data-save]').addEventListener('click', () => save(card, t.id, false));
      return card;
    }

    async function save(scope, id, regenerate, regenerateView) {
      const payload = gather(scope);
      payload.id = id;
      payload.is_active = scope.querySelector('[data-field="is_active"]').checked;
      const hostSel = scope.querySelector('[data-taghost]');
      if (hostSel) payload.tag_host = hostSel.value;
      if (regenerate) payload.regenerate_token = true;
      if (regenerateView) payload.regenerate_view_token = true;
      try {
        const r = await fetch(API_BASE + '/api/tenants', {
          method: 'POST',
          headers: { 'content-type': 'application/json', 'x-admin-secret': secret() },
          body: JSON.stringify(payload)
        });
        const j = await r.json();
        if (!j.ok) { setMsg('Erro ao salvar: ' + (j.detail || j.error || r.status), false); return; }
        setMsg('Salvo.', true);
        load();
      } catch (e) { setMsg('Falha de conexão.', false); }
    }

    async function create() {
      const payload = gather(el('new-form'));
      payload.slug = (el('new-form').querySelector('[data-field="slug"]') || {}).value;
      try {
        const r = await fetch(API_BASE + '/api/tenants', {
          method: 'POST',
          headers: { 'content-type': 'application/json', 'x-admin-secret': secret() },
          body: JSON.stringify(payload)
        });
        const j = await r.json();
        if (!j.ok) { setMsg('Erro ao criar: ' + (j.detail || j.error || r.status), false); return; }
        setMsg('Site criado.', true);
        load();
      } catch (e) { setMsg('Falha de conexão.', false); }
    }

    async function load() {
      if (!secret()) { setMsg('Informe a senha de administração.', false); return; }
      localStorage.setItem('adminSecret', secret());
      try {
        const r = await fetch(API_BASE + '/api/tenants', { headers: { 'x-admin-secret': secret() } });
        const j = await r.json();
        if (!j.ok) { setMsg('Não autorizado.', false); return; }
        const list = el('list');
        list.innerHTML = '';
        j.tenants.forEach(t => list.appendChild(tenantCard(t)));
        setMsg(j.tenants.length + ' site(s) carregado(s).', true);
      } catch (e) { setMsg('Falha de conexão.', false); }
    }

    function buildNewForm() {
      const form = el('new-form');
      form.innerHTML =
        '<div><label class="block text-xs font-medium text-slate-500 dark:text-slate-400 mb-1">Slug (auto pelo site)</label>' +
        '<input data-field="slug" type="text" placeholder="opcional" class="w-full border border-slate-300 dark:border-slate-600 dark:bg-slate-700 dark:text-slate-100 rounded-lg px-2 py-1.5 text-sm" /></div>' +
        fieldsGrid();

      const defaults = {
        sample_rate: '0.10', slow_threshold_ms: '5000', very_slow_threshold_ms: '10000',
        retention_hours: '3', aggregation_freshness_minutes: '1', min_group_size: '3',
        default_period_key: '3h', timezone: 'America/Sao_Paulo'
      };
      Object.keys(defaults).forEach(k => {
        const i = form.querySelector('[data-field="' + k + '"]');
        if (i) i.value = defaults[k];
      });

      const siteInput = form.querySelector('[data-field="site"]');
      const slugInput = form.querySelector('[data-field="slug"]');
      const domInput = form.querySelector('[data-field="allowed_domains"]');
      slugInput.addEventListener('input', () => { slugInput.dataset.touched = '1'; });
      domInput.addEventListener('input', () => { domInput.dataset.touched = '1'; });
      siteInput.addEventListener('input', () => {
        const bare = siteInput.value.trim().toLowerCase().replace(/^https?:\/\//, '').replace(/\/.*$/, '').replace(/^www\./, '');
        if (!bare) return;
        if (!slugInput.dataset.touched) slugInput.value = bare.split('.')[0];
        if (!domInput.dataset.touched) domInput.value = bare + ', www.' + bare;
      });
    }

    el('theme-toggle').addEventListener('click', () => {
      const root = document.documentElement;
      root.classList.toggle('dark');
      localStorage.setItem('theme', root.classList.contains('dark') ? 'dark' : 'light');
      el('theme-icon').textContent = root.classList.contains('dark') ? '☀️' : '🌙';
    });
    el('theme-icon').textContent = document.documentElement.classList.contains('dark') ? '☀️' : '🌙';

    el('load').addEventListener('click', load);
    el('create').addEventListener('click', create);
    buildNewForm();

    const saved = localStorage.getItem('adminSecret');
    if (saved) { el('admin-secret').value = saved; load(); }
  </script>
</body>
</html>
